<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Interactive Teaching Platform{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    {% block extra_css %}{% endblock %}
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-white border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="{% url 'core:index' %}" class="flex items-center gap-2 text-xl font-bold text-indigo-700">
                    <i class="fas fa-graduation-cap"></i> Teaching Platform
                </a>
                <div class="flex items-center gap-6">
                    <a href="{% url 'core:index' %}" class="text-gray-600 hover:text-indigo-700 transition">Home</a>
                    <a href="/api/" target="_blank" class="text-gray-600 hover:text-indigo-700 transition">API</a>
                    <a href="/admin/" target="_blank" class="text-gray-600 hover:text-indigo-700 transition">Admin</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 text-gray-300 py-8 mt-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p>&copy; 2026 Interactive Teaching Platform. All rights reserved.</p>
        </div>
    </footer>

    <!-- Modal for multimedia content -->
    <div id="multimediaModal" class="hidden fixed inset-0 z-50 overflow-y-auto">
        <!-- Backdrop -->
        <div id="modalBackdrop" class="fixed inset-0 bg-black bg-opacity-50 backdrop-blur-sm transition-opacity duration-200"></div>
        
        <!-- Modal content -->
        <div class="flex items-center justify-center min-h-screen px-4 py-6">
            <div class="relative bg-white rounded-xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                <!-- Close button -->
                <button id="modalClose" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 z-10">
                    <i class="fas fa-times text-2xl"></i>
                </button>
                
                <!-- Modal header -->
                <div class="sticky top-0 bg-gradient-to-r from-indigo-700 via-indigo-600 to-blue-600 px-6 py-4 text-white">
                    <h3 id="multimediaTitle" class="text-xl font-bold">Content</h3>
                </div>
                
                <!-- Modal body -->
                <div id="multimediaContent" class="p-6">
                    <!-- Content will be loaded here -->
                </div>
            </div>
        </div>
    </div>
    
    {% load static %}
    <script src="{% static 'js/modal.js' %}"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
